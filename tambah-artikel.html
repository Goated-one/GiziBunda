<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiziBunda - Upload Artikel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f3f4f6; 
        }
        /* Style untuk Placeholder di div contenteditable jika kosong */
        #editor:empty:before {
            content: attr(data-placeholder);
            color: #9ca3af;
            background-color: transparent;
        }
        /* Mengatur style dasar elemen teks di dalam editor agar rapi visualnya */
        #editor h1 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; }
        #editor h2 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; }
        #editor ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        #editor ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        #editor p { margin-bottom: 0.75rem; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-[#0d9488] text-white flex flex-col justify-between p-4 rounded-r-[20px]">
        <div>
            <div class="text-2xl font-bold text-[#eab308] px-4 py-6">
                GiziBunda
            </div>
            
            <nav class="space-y-2">
                <a href="admin_home.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-[#0f766e] transition">
                    <i class="fa-solid fa-table-columns w-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="resep_admin.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-[#0f766e] transition">
                    <i class="fa-solid fa-utensils w-5"></i>
                    <span>Resep</span>
                </a>
                <a href="artikel_admin.html" class="flex items-center space-x-3 px-4 py-3 bg-white text-[#0d9488] font-medium rounded-l-full -mr-4 shadow-sm">
                    <i class="fa-solid fa-book-open w-5"></i>
                    <span>Artikel</span>
                </a>
            </nav>
        </div>

        <button class="flex items-center justify-center space-x-2 bg-[#dc2626] text-white py-2.5 px-4 rounded-xl font-medium hover:bg-red-700 transition w-full mb-4">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Logout</span>
        </button>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="bg-white px-8 py-4 flex items-center justify-between border-b border-gray-200">
            <div class="relative w-1/3">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input type="text" placeholder="Cari data, resep, artikel" class="w-full bg-gray-100 pl-10 pr-4 py-2 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            <div class="flex items-center space-x-6">
                <button class="text-gray-500 hover:text-gray-700 relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <div class="w-9 h-9 bg-gray-300 rounded-full flex items-center justify-center text-gray-600 cursor-pointer">
                    <i class="fa-regular fa-user text-lg"></i>
                </div>
            </div>
        </header>

        <div class="p-8 flex-1 overflow-y-auto">
            <h1 class="text-xl font-bold text-gray-800 mb-6">Upload Artikel baru/edit artikel</h1>

            <form id="formTambahArtikel" onsubmit="simpanArtikelSupabase(event)" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-6 bg-[#d1d5db] p-6 rounded-2xl flex flex-col space-y-5">
                    <div>
                        <h3 class="text-gray-700 font-medium mb-2 text-sm">Media</h3>
                        <div class="border-2 border-dashed border-gray-400 rounded-xl p-8 bg-white flex flex-col items-center justify-center text-center cursor-pointer hover:bg-gray-50 transition relative min-h-[220px]">
                            <input type="file" id="inputFotoArtikel" name="foto_artikel" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                            <div class="bg-[#15803d] text-white p-3 rounded-xl mb-3">
                                <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                            </div>
                            <span class="text-base font-bold text-emerald-800">Upload foto artikel</span>
                            <span class="text-xs text-gray-500 mt-1">Drag and drop or click to browse (Max 5MB, JPG/PNG)</span>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <h3 class="text-gray-700 font-medium text-sm flex items-center gap-1.5">
                            <i class="fa-solid fa-circle-info"></i> Informasi
                        </h3>
                        
                        <input type="text" id="inputJudul" name="judul" placeholder="Masukan Judul artikel yang menarik" 
                            class="w-full px-4 py-2.5 rounded-xl border-none focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm placeholder-gray-400">
                        
                        <input type="text" id="inputPenulis" name="penulis" placeholder="Nama penulis artikel" 
                            class="w-full px-4 py-2.5 rounded-xl border-none focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm placeholder-gray-400">
                        
                        <div>
                            <span class="text-xs font-semibold text-gray-600 block mb-2">Kategori artikel</span>
                            <div class="flex gap-2">
                                <label class="cursor-pointer">
                                    <input type="radio" name="kategori" value="Nutrisi" class="hidden peer" checked>
                                    <span class="px-5 py-1.5 bg-white text-gray-500 text-xs font-medium rounded-full border border-gray-200 peer-checked:bg-teal-600 peer-checked:text-white block shadow-sm">Nutrisi</span>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="kategori" value="Kesehatan" class="hidden peer">
                                    <span class="px-5 py-1.5 bg-white text-gray-500 text-xs font-medium rounded-full border border-gray-200 peer-checked:bg-teal-600 peer-checked:text-white block shadow-sm">Kesehatan</span>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="kategori" value="Psikologi" class="hidden peer">
                                    <span class="px-5 py-1.5 bg-white text-gray-500 text-xs font-medium rounded-full border border-gray-200 peer-checked:bg-teal-600 peer-checked:text-white block shadow-sm">Psikologi</span>
                                </label>
                            </div>
                        </div>

                        <div class="relative w-1/2">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 text-sm">
                                <i class="fa-regular fa-clock"></i>
                            </span>
                            <input type="text" id="inputWaktuBaca" name="waktu_baca" placeholder="Waktu Baca Artikel (Angka saja, misal: 5)" 
                                class="w-full pl-9 pr-4 py-2.5 rounded-xl border-none focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm placeholder-gray-400">
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-6 flex flex-col justify-between">
                    <div class="bg-[#d1d5db] p-6 rounded-2xl flex-1 flex flex-col">
                        <h3 class="text-gray-700 font-medium mb-2 text-sm">Isi artikel</h3>
                        
                        <div class="bg-white rounded-xl border border-gray-300 flex-1 flex flex-col overflow-hidden min-h-[350px]">
                            
                            <div class="flex flex-wrap items-center justify-between gap-y-2 px-3 py-2 border-b border-gray-200 bg-gray-50 text-gray-600 text-sm selection:bg-teal-100">
                                <div class="flex flex-wrap items-center gap-x-3 gap-y-1">
                                    <div class="flex space-x-1">
                                        <button type="button" onclick="formatDoc('bold')" class="hover:text-black font-bold px-2 py-0.5 rounded hover:bg-gray-200 transition">B</button>
                                        <button type="button" onclick="formatDoc('italic')" class="hover:text-black italic px-2 py-0.5 rounded hover:bg-gray-200 transition">I</button>
                                        <button type="button" onclick="formatDoc('underline')" class="hover:text-black underline px-2 py-0.5 rounded hover:bg-gray-200 transition">U</button>
                                    </div>
                                    <div class="h-4 w-[1px] bg-gray-300"></div>
                                    
                                    <select onchange="formatDoc('fontName', this.value); this.selectedIndex=0;" class="bg-white border border-gray-300 rounded px-1.5 py-0.5 text-xs focus:outline-none cursor-pointer">
                                        <option value="" disabled selected>Font</option>
                                        <option value="Poppins">Poppins</option>
                                        <option value="Arial">Arial</option>
                                        <option value="Courier New">Courier New</option>
                                        <option value="Georgia">Georgia</option>
                                        <option value="Times New Roman">Times New Roman</option>
                                        <option value="Verdana">Verdana</option>
                                    </select>

                                    <select onchange="formatDoc('fontSize', this.value); this.selectedIndex=0;" class="bg-white border border-gray-300 rounded px-1.5 py-0.5 text-xs focus:outline-none cursor-pointer">
                                        <option value="" disabled selected>Ukuran</option>
                                        <option value="1">Sangat Kecil</option>
                                        <option value="2">Kecil</option>
                                        <option value="3">Normal</option>
                                        <option value="4">Sedang</option>
                                        <option value="5">Besar</option>
                                        <option value="6">Sangat Besar</option>
                                    </select>
                                    
                                    <div class="flex items-center space-x-1 bg-white border border-gray-300 rounded px-1.5 py-0.5">
                                        <label for="textColor" class="text-xs cursor-pointer"><i class="fa-solid fa-palette text-gray-500"></i></label>
                                        <input type="color" id="textColor" onchange="formatDoc('foreColor', this.value)" class="w-4 h-4 p-0 border-none rounded cursor-pointer bg-transparent">
                                    </div>

                                    <div class="h-4 w-[1px] bg-gray-300"></div>
                                    
                                    <div class="flex space-x-1">
                                        <button type="button" onclick="formatDoc('formatBlock', 'h1')" class="hover:text-black font-semibold text-xs px-2 py-0.5 rounded hover:bg-gray-200 transition">H1</button>
                                        <button type="button" onclick="formatDoc('formatBlock', 'h2')" class="hover:text-black font-semibold text-xs px-2 py-0.5 rounded hover:bg-gray-200 transition">H2</button>
                                    </div>
                                    <div class="h-4 w-[1px] bg-gray-300"></div>
                                    
                                    <div class="flex space-x-1">
                                        <button type="button" onclick="formatDoc('insertUnorderedList')" class="hover:text-black px-2 py-0.5 rounded hover:bg-gray-200 transition"><i class="fa-solid fa-list-ul"></i></button>
                                        <button type="button" onclick="formatDoc('insertOrderedList')" class="hover:text-black px-2 py-0.5 rounded hover:bg-gray-200 transition"><i class="fa-solid fa-list-ol"></i></button>
                                    </div>
                                </div>
                                
                                <div class="flex space-x-1">
                                    <button type="button" onclick="formatDoc('undo')" class="hover:text-black px-2 py-0.5 rounded hover:bg-gray-200 transition"><i class="fa-solid fa-arrow-rotate-left"></i></button>
                                    <button type="button" onclick="formatDoc('redo')" class="hover:text-black px-2 py-0.5 rounded hover:bg-gray-200 transition"><i class="fa-solid fa-arrow-rotate-right"></i></button>
                                </div>
                            </div>
                            
                            <div id="editor" contenteditable="true" data-placeholder="Ketik sesuatu..." class="w-full flex-1 p-4 overflow-y-auto outline-none text-sm min-h-[300px] bg-white"></div>
                        </div>
                    </div>

                    <input type="hidden" name="isi_artikel" id="isi_artikel_input">

                    <div class="mt-6">
                        <button type="submit" id="btnSimpanArtikel" class="w-full bg-[#3eafa9] text-white py-4 rounded-xl font-bold text-xl hover:bg-[#2f938e] transition shadow-md tracking-wide">
                            Simpan Artikel
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://zmnrusboixvljkhyisuu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptbnJ1c2JvaXh2bGpraHlpc3V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODMyNjIsImV4cCI6MjA5NDA1OTI2Mn0.73-guULNTIoFZinP_OijbR9E6qPJ4d2hGLwFZSLtEjw';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function formatDoc(cmd, value = null) {
            if (value) {
                document.execCommand(cmd, false, value);
            } else {
                document.execCommand(cmd, false, null);
            }
            document.getElementById('editor').focus();
            updateHiddenInput();
        }

        function updateHiddenInput() {
            const editorContent = document.getElementById('editor').innerHTML;
            document.getElementById('isi_artikel_input').value = editorContent;
        }

        document.getElementById('editor').addEventListener('input', updateHiddenInput);

        async function simpanArtikelSupabase(event) {
            event.preventDefault(); 

            const btnSimpan = document.getElementById('btnSimpanArtikel');
            const judul = document.getElementById('inputJudul').value.trim();
            const penulis = document.getElementById('inputPenulis').value.trim();
            const waktuBacaRaw = document.getElementById('inputWaktuBaca').value.trim();
            const kontenHtml = document.getElementById('editor').innerHTML.trim();
            
            const kategoriRadio = document.querySelector('input[name="kategori"]:checked');
            const tag = kategoriRadio ? kategoriRadio.value : 'Nutrisi';
            const fileFoto = document.getElementById('inputFotoArtikel').files[0];

            if (!judul || !kontenHtml || kontenHtml === '<br>') {
                alert("Judul Artikel dan Isi Artikel wajib diisi ya bray!");
                return;
            }

            // Ekstrak angka murni untuk kolom waktu_baca (int4) bray biar ga error crash database
            const angkaWaktuBaca = parseInt(waktuBacaRaw.replace(/[^0-9]/g, '')) || 3;

            btnSimpan.innerText = 'Menyimpan...';
            btnSimpan.disabled = true;

            try {
                let publicImageUrl = '';

                if (fileFoto) {
                    const ext = fileFoto.name.split('.').pop();
                    const fileName = `art_${Date.now()}.${ext}`;

                    const { error: uploadError } = await supabaseClient.storage
                        .from('articles_images')
                        .upload(fileName, fileFoto);

                    if (uploadError) throw uploadError;

                    const { data: urlData } = supabaseClient.storage
                        .from('articles_images')
                        .getPublicUrl(fileName);

                    publicImageUrl = urlData.publicUrl;
                }

                // PERBAIKAN LOGIKA INSERT & PASANGAN NAMA KEY VALUE PAS MAPPING DATABASE BRAY
                const { error: insertError } = await supabaseClient
                    .from('articles') // Sesuaikan nama tabel lo: 'articles' sesuai query load lo kemarin
                    .insert([
                        {
                            title: judul,
                            tag: tag,
                            content: kontenHtml,
                            image_url: publicImageUrl,
                            author: penulis || 'Tim Medis GiziBunda',
                            waktu_baca: angkaWaktuBaca // Dikirim bertipe data integer murni bray!
                        }
                    ]);

                if (insertError) throw insertError;

                alert("Sukses! Artikel edukasi baru berhasil diunggah.");
                window.location.href = 'artikel_admin.html'; 

            } catch (err) {
                alert("Gagal mengunggah data: " + err.message);
            } finally {
                btnSimpan.innerText = 'Simpan Artikel';
                btnSimpan.disabled = false;
            }
        }
    </script>
</body>
</html>
